type: loadbalancing
display_name: Load Balancing Exporter

status:
  class: exporter
  stability:
    beta: [traces, logs]
    development: [metrics]
  distributions: [contrib, k8s]
  codeowners:
    active: [rlankfo]
    emeritus: [jpkrohling]
    seeking_new: true

attributes:
  endpoint:
    description: The endpoint of the backend
    type: string
  reason:
    description: Low-cardinality reason
    type: string
  resolver:
    description: Resolver used
    type: string
    enum:
      - aws
      - dns
      - k8s
      - static
  result:
    description: Reroute result
    type: string
    enum:
      - success
      - failure
      - skipped
  signal:
    description: Telemetry signal
    type: string
    enum:
      - traces
      - logs
      - metrics
  state:
    description: Endpoint health state
    type: string
    enum:
      - eligible
      - quarantined
      - stale
  success:
    description: Whether an outcome was successful
    type: bool

telemetry:
  metrics:
    loadbalancer_backend_fail_open_total:
      enabled: true
      stability: development
      description: Number of times endpoint health failed open because every resolver-present backend was quarantined.
      unit: "{events}"
      sum:
        value_type: int
        monotonic: true
    loadbalancer_backend_latency:
      attributes: [endpoint]
      enabled: true
      stability: development
      description: Response latency in ms for the backends.
      unit: ms
      histogram:
        value_type: int
        bucket_boundaries: [5, 10, 20, 50, 100, 200, 500, 1000, 2000, 5000]
    loadbalancer_backend_outcome:
      attributes: [success]
      enabled: true
      stability: development
      description: Number of successes and failures for each endpoint.
      unit: "{outcomes}"
      sum:
        value_type: int
        monotonic: true
    loadbalancer_backend_quarantine_total:
      attributes: [endpoint, reason]
      enabled: true
      stability: development
      description: Number of times a backend endpoint was quarantined.
      unit: "{quarantines}"
      sum:
        value_type: int
        monotonic: true
    loadbalancer_backend_request_bytes:
      attributes: [endpoint, signal]
      enabled: true
      stability: development
      description: Backend request payload size in bytes.
      unit: By
      histogram:
        value_type: int
    loadbalancer_backend_request_items:
      attributes: [endpoint, signal]
      enabled: true
      stability: development
      description: Number of signal items in each backend request.
      unit: "{items}"
      histogram:
        value_type: int
    loadbalancer_backend_request_total:
      attributes: [endpoint, signal]
      enabled: true
      stability: development
      description: Number of backend requests sent by signal.
      unit: "{requests}"
      sum:
        value_type: int
        monotonic: true
    loadbalancer_backend_reroute_total:
      attributes: [signal, result, reason]
      enabled: true
      stability: development
      description: Number of endpoint-failure reroute attempts.
      unit: "{reroutes}"
      sum:
        value_type: int
        monotonic: true
    loadbalancer_backend_stale_total:
      attributes: [endpoint]
      enabled: true
      stability: development
      description: Number of times a backend endpoint disappeared from resolver membership.
      unit: "{stale_endpoints}"
      sum:
        value_type: int
        monotonic: true
    loadbalancer_backend_state:
      attributes: [endpoint, state]
      enabled: true
      stability: development
      description: Current endpoint health state by backend.
      unit: "{backends}"
      gauge:
        value_type: int
    loadbalancer_backend_unquarantine_total:
      attributes: [endpoint, reason]
      enabled: true
      stability: development
      description: Number of times a backend endpoint was admitted after quarantine.
      unit: "{unquarantines}"
      sum:
        value_type: int
        monotonic: true
    loadbalancer_central_queue_active_lanes:
      attributes: [signal]
      enabled: true
      stability: development
      description: Number of central queue lanes with queued telemetry.
      unit: "{lanes}"
      gauge:
        value_type: int
    loadbalancer_central_queue_capacity_bytes:
      attributes: [signal]
      enabled: true
      stability: development
      description: Configured central queue capacity in compressed bytes.
      unit: By
      gauge:
        value_type: int
    loadbalancer_central_queue_enqueue_total:
      attributes: [signal, result]
      enabled: true
      stability: development
      description: Number of central queue enqueue attempts by result.
      unit: "{items}"
      sum:
        value_type: int
        monotonic: true
    loadbalancer_central_queue_oldest_item_age:
      attributes: [signal]
      enabled: true
      stability: development
      description: Age in milliseconds of the oldest item waiting in the central queue.
      unit: ms
      gauge:
        value_type: int
    loadbalancer_central_queue_size_bytes:
      attributes: [signal]
      enabled: true
      stability: development
      description: Current central queue size in compressed bytes.
      unit: By
      gauge:
        value_type: int
    loadbalancer_central_queue_window_compressed_bytes:
      attributes: [signal]
      enabled: true
      stability: development
      description: Compressed bytes drained from the central queue for each backend request window.
      unit: By
      histogram:
        value_type: int
    loadbalancer_central_queue_window_flush_total:
      attributes: [signal, reason]
      enabled: true
      stability: development
      description: Number of central queue windows flushed by bounded reason.
      unit: "{windows}"
      sum:
        value_type: int
        monotonic: true
    loadbalancer_central_queue_window_items:
      attributes: [signal]
      enabled: true
      stability: development
      description: Number of signal items coalesced in each central queue backend request window.
      unit: "{items}"
      histogram:
        value_type: int
    loadbalancer_central_queue_window_payloads:
      attributes: [signal]
      enabled: true
      stability: development
      description: Number of queued payloads merged into each central queue backend request window.
      unit: "{payloads}"
      histogram:
        value_type: int
    loadbalancer_central_queue_window_uncompressed_bytes:
      attributes: [signal]
      enabled: true
      stability: development
      description: Uncompressed bytes represented by each central queue backend request window.
      unit: By
      histogram:
        value_type: int
    loadbalancer_central_queue_window_underfilled_total:
      attributes: [signal, reason]
      enabled: true
      stability: development
      description: Number of central queue windows sent below target compressed bytes by bounded reason.
      unit: "{windows}"
      sum:
        value_type: int
        monotonic: true

    loadbalancer_num_backend_updates:
      attributes: [resolver]
      enabled: true
      stability: development
      description: Number of times the list of backends was updated.
      unit: "{updates}"
      sum:
        value_type: int
        monotonic: true
    loadbalancer_num_backends:
      attributes: [resolver]
      enabled: true
      stability: development
      description: Current number of backends in use.
      unit: "{backends}"
      gauge:
        value_type: int
    loadbalancer_num_resolutions:
      attributes: [success, resolver]
      enabled: true
      stability: development
      description: Number of times the resolver has triggered new resolutions.
      unit: "{resolutions}"
      sum:
        value_type: int
        monotonic: true

tests:
  config:
    routing_key: "service"
    protocol:
      otlp:
        timeout: 1s
    resolver:
      static:
        hostnames:
          - backend-1:4317
          - backend-2:4317
          - backend-3:4317
          - backend-4:4317
  expect_consumer_error: true
  goleak:
    ignore:
      top:
        # Ignore goroutines spawned by net.Resolver for DNS lookups on Windows
        # These can remain in syscall state during test cleanup
        - internal/poll.runtime_pollWait
        - syscall.Syscall6
        - syscall.SyscallN
