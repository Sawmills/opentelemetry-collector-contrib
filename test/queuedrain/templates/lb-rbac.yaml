apiVersion: v1
kind: ServiceAccount
metadata:
  name: queue-drain-lb
  namespace: queue-drain
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: queue-drain-lb
  namespace: queue-drain
rules:
  - apiGroups: ["discovery.k8s.io"]
    resources: ["endpointslices"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: queue-drain-lb
  namespace: queue-drain
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: queue-drain-lb
subjects:
  - kind: ServiceAccount
    name: queue-drain-lb
    namespace: queue-drain
