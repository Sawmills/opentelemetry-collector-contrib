type: parquet_log_encoding

status:
  class: extension
  stability:
    alpha: [extension]
  distributions: []
  codeowners:
    active: [sawmills]

telemetry:
  metrics:
    parquet_log_encoding_buffer_estimated_bytes:
      enabled: true
      description: Estimated compressed bytes currently buffered in the parquet log encoder
      unit: By
      gauge:
        value_type: int
    parquet_log_encoding_buffer_records:
      enabled: true
      description: Number of log records currently buffered in the parquet log encoder
      unit: "1"
      gauge:
        value_type: int
    parquet_log_encoding_buffer_oldest_record_age:
      enabled: true
      description: Age in seconds of the oldest buffered record in the parquet log encoder
      unit: s
      gauge:
        value_type: int
    parquet_log_encoding_flush_attempt_total:
      enabled: true
      description: Number of flush attempts made by the parquet log encoder
      unit: "1"
      sum:
        value_type: int
        monotonic: true
    parquet_log_encoding_flush_total:
      enabled: true
      description: Number of non-empty parquet buffer flushes
      unit: "1"
      sum:
        value_type: int
        monotonic: true
    parquet_log_encoding_flush_empty_total:
      enabled: true
      description: Number of flush attempts that found no buffered parquet records
      unit: "1"
      sum:
        value_type: int
        monotonic: true
    parquet_log_encoding_flush_failed_total:
      enabled: true
      description: Number of parquet flush attempts that failed after records were buffered
      unit: "1"
      sum:
        value_type: int
        monotonic: true
    parquet_log_encoding_flushed_records:
      enabled: true
      description: Number of buffered records emitted by non-empty parquet flushes
      unit: "1"
      sum:
        value_type: int
        monotonic: true
    parquet_log_encoding_flushed_bytes:
      enabled: true
      description: Bytes emitted by non-empty parquet flushes before S3-level compression
      unit: By
      sum:
        value_type: int
        monotonic: true
    parquet_log_encoding_time_to_flush:
      enabled: true
      description: Time in milliseconds from first buffered parquet record to successful non-empty flush
      unit: ms
      histogram:
        value_type: int
        bucket_boundaries: [1, 10, 50, 100, 250, 500, 1000, 5000, 10000, 30000, 60000, 300000, 900000]

tests:
  config:
